name: Build release installer

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows installer
    if: github.event.release.tag_name != ''
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage release binary for installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target\release | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\claudometer.exe target\release\claudometer.exe -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Derive installer version
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PATH=dist\Claudometer-Setup-$version.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: iscc "/DMyAppVersion=$env:APP_VERSION" installer\claudometer.iss

      - name: Upload installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$env:INSTALLER_PATH" --clobber
